site_name: pyxis-agent
site_description: 声明式思维链 agent 框架：schema as workflow
site_url: https://onenightcarnival.github.io/pyxis-agent/
repo_url: https://github.com/Onenightcarnival/pyxis-agent
repo_name: pyxis-agent
edit_uri: edit/main/docs/
copyright: MIT License

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - assets/custom.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.keys

plugins:
  - search:
      lang:
        - zh
        - en
  - gen-files:
      scripts:
        - docs/_hooks/gen_api.py
        - docs/_hooks/gen_cookbook.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            docstring_section_style: table
            members_order: source
            filters: ["!^_"]

nav:
  - 首页:
      - 首页: index.md
      - 对比其他框架: comparison.md
  - 概念:
      - concepts/index.md
      - 哲学与定位: concepts/philosophy.md
      - Step：schema-first 单次调用: concepts/step.md
      - Tool：action 即 schema: concepts/tool.md
      - Flow：显式编排: concepts/flow.md
  - Cookbook:
      - cookbook/index.md
      - 测试:
          - FakeClient 与断言: cookbook/testing.md
          - Evals 一把梭: cookbook/evals.md
      - 可观测:
          - 可观测总览: cookbook/observability.md
          - 接入 Langfuse: cookbook/with_langfuse.md
      - MCP:
          - MCP 总览: cookbook/mcp.md
          - MCP 混合注册: cookbook/mcp_tool_use.md
      - Interrupt:
          - Interrupt 总览: cookbook/interrupt.md
          - Interrupt review: cookbook/interrupt_review.md
      - Agent 模式:
          - 端到端：分析 + 规划: cookbook/research.md
          - 流式输出: cookbook/streaming_demo.md
          - Plan-then-execute: cookbook/plan_then_execute.md
          - RAG 最小版: cookbook/rag_minimal.md
          - 批量结构化抽取: cookbook/batch_extraction.md
          - Router / 意图分派: cookbook/router_dispatch.md
          - 长期记忆 KV: cookbook/memory_kv.md
          - 两个 agent 协作: cookbook/multi_agent.md
          - Reflection / critic-refiner: cookbook/reflect_and_revise.md
          - ReAct agent + 工具调用: cookbook/agent_tool_use.md
          - Agentic harness: cookbook/coding_harness.md
          - Guardrails：输入/输出校验: cookbook/guardrails.md
  - API 参考:
      - pyxis.step: api/step.md
      - pyxis.flow: api/flow.md
      - pyxis.tool: api/tool.md
      - pyxis.client: api/client.md
      - pyxis.interrupt: api/interrupt.md
      - pyxis.mcp: api/mcp.md
