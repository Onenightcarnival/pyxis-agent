site_name: pyxis-agent
site_description: 把 LLM 调用写成 Python 函数，返回 Pydantic 实例
site_url: https://onenightcarnival.github.io/pyxis-agent/
repo_url: https://github.com/Onenightcarnival/pyxis-agent
repo_name: pyxis-agent
edit_uri: edit/main/docs/
copyright: MIT License

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - assets/custom.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.keys

plugins:
  - search:
      lang:
        - zh
        - en
  - gen-files:
      scripts:
        - docs/_hooks/gen_api.py
        - docs/_hooks/gen_cookbook.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            docstring_section_style: table
            members_order: source
            filters: ["!^_"]

nav:
  - 首页:
      - 首页: index.md
      - 对比其他框架: comparison.md
  - 概念:
      - concepts/index.md
      - 项目定位: concepts/philosophy.md
      - Step：结构化调用: concepts/step.md
      - Tool：结构化动作: concepts/tool.md
  - Cookbook:
      - cookbook/index.md
      - 入门:
          - 两步结构化调用: cookbook/research.md
          - 字段流式输出: cookbook/streaming_demo.md
          - 批量结构化抽取: cookbook/batch_extraction.md
      - 多步编排:
          - 计划后执行: cookbook/plan_then_execute.md
          - 意图路由: cookbook/router_dispatch.md
          - 自我检查与改写: cookbook/reflect_and_revise.md
          - 人工审阅节点: cookbook/interrupt_review.md
          - Interrupt 接入说明: cookbook/interrupt.md
      - 数据和状态:
          - 检索增强问答: cookbook/rag_minimal.md
          - 轻量记忆: cookbook/memory_kv.md
          - 双 agent 协作: cookbook/multi_agent.md
      - 工具和外部系统:
          - 本地工具调用循环: cookbook/agent_tool_use.md
          - 文件工具任务循环: cookbook/coding_harness.md
          - MCP 接入说明: cookbook/mcp.md
          - MCP 工具接入: cookbook/mcp_tool_use.md
      - 工程化:
          - 单元测试: cookbook/testing.md
          - 小数据集评测: cookbook/evals.md
          - 可观测接入说明: cookbook/observability.md
          - Langfuse 接入: cookbook/with_langfuse.md
          - 输入输出护栏: cookbook/guardrails.md
  - API 参考:
      - pyxis.step: api/step.md
      - pyxis.tool: api/tool.md
      - pyxis.client: api/client.md
      - pyxis.interrupt: api/interrupt.md
      - pyxis.mcp: api/mcp.md
